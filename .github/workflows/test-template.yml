name: Test template

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Install expect
      run: sudo apt-get install -y expect
    - name: Run configure.sh tests
      run: bash scripts/test_configure.sh
